---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bankapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: myapp
  minReplicas: 4
  maxReplicas: 8

  metrics:
    - type: Resource 
      resource: 
        name: cpu 
        target: 
          type: Utilization
          averageUtilization: 60
